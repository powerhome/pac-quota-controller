name: Pre-commit Checks

on:
  pull_request:
    paths:
      - '**.go'
      - 'Makefile'
      - '.pre-commit-config.yaml'
      - 'ct.yaml'
      - '**.md'
      - '**.yaml'
      - '**.yml'

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          check-latest: true
      - name: Install dependencies
        run: make deps
      - name: Run fmt
        run: make fmt
      - name: Run vet
        run: make vet
      - name: Run make generate
        run: make generate
      - name: Run make helm-docs
        run: make helm-docs
      - name: Check for uncommitted changes (codegen, manifests, lint)
        run: |
          git diff --exit-code || (echo 'ERROR: Uncommitted changes after codegen/lint. Please run make manifests, make generate, make lint and commit the results.' && exit 1)
